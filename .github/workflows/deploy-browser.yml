name: Deploy STAC Browser to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["stac_catalog/**", ".github/workflows/deploy-browser.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build radiantearth/stac-browser (static)
        run: |
          git clone --depth 1 https://github.com/radiantearth/stac-browser.git _browser
          cd _browser
          npm ci
          SB_catalogUrl="https://raw.githubusercontent.com/celsohlsj/ybyrastac/main/stac_catalog/catalog.json" \
          SB_pathPrefix="/ybyrastac/browser/" \
          npm run build
          cd ..
          mkdir -p _site/browser
          cp -r _browser/dist/* _site/browser/
          cp -r stac_catalog _site/stac_catalog
          cp docs/landing/index.html _site/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
