name: Deploy STAC Browser to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["stac_catalog/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build radiantearth/stac-browser (static)
        run: |
          git clone --depth 1 https://github.com/radiantearth/stac-browser.git _browser
          cd _browser
          npm ci
          CATALOG_URL="https://celsohlsj.github.io/ybyrastac/stac_catalog/catalog.json" \
          PATH_PREFIX="/ybyrastac/" \
          npm run build -- --historyMode=hash
          cd ..
          mkdir -p _site
          cp -r _browser/dist/* _site/
          cp -r stac_catalog _site/stac_catalog

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
