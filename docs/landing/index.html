<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="30;url=/ybyrastac/browser/">
  <title>YbYráSTAC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #58a6ff;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #238636;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #2ea043; }
    .countdown {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #484f58;
    }
    #sec { color: #8b949e; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>YbYráSTAC</h1>
    <p class="subtitle">
      Catálogo STAC de produtos de Observação da Terra<br>
      para florestas brasileiras — YbYrá-BR
    </p>
    <a class="btn" href="/ybyrastac/browser/">Abrir STAC Browser</a>
    <p class="countdown">Redirecionando em <span id="sec">30</span> s…</p>
  </div>
  <script>
    var n = 30;
    var el = document.getElementById('sec');
    var iv = setInterval(function () {
      n--;
      el.textContent = n;
      if (n <= 0) {
        clearInterval(iv);
        window.location.href = '/ybyrastac/browser/';
      }
    }, 1000);
  </script>
</body>
</html>
